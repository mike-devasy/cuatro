<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cuatrobet - Registro</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div class="wrapper">
      <header data-fls-header data-fls-header-scroll class="header">
        <div class="header__container">
          <a href="https://cuatrobet.com/" aria-label="Cuatrobet" class="header__logo">
            <img src="/images/patrick/svgicons/logo-icon.svg" alt="" class="header__logo-icon" />
            <img src="/images/patrick/svgicons/logo-title.svg" alt="Cuatrobet" class="header__logo-title brand__logo" />
          </a>
          <div class="header__buttons">
            <a href="https://cuatrobet.com/login" class="header__button button button--primary">Log In</a>
            <a href="#register-form" class="header__button button button--secondary">Sign Up</a>
          </div>
        </div>
      </header>

      <main class="page">
        <section class="page__hero hero">
          <div class="hero__container container">
            <picture class="hero__picture">
              <source media="(max-width: 600px)" srcset="/images/patrick/hero-image-600.webp" type="image/webp" />
              <img class="hero__image" alt="Hero Image" src="/images/patrick/hero-image.webp" />
              <span class="hero__label hero__label--1">Cuatro</span>
              <span class="hero__label hero__label--2">Partners</span>
            </picture>
          </div>
          <div class="hero__banner banner">
            <div class="banner__container container">
              <h1 class="banner__title">Where Traffic Meets Winning</h1>
            </div>
          </div>
        </section>

        <section class="page__form form">
          <div class="form__container container">
            <section class="form-panel form-panel--patrick" aria-label="Registration form">
              <div class="form__content">
                <h2 class="form__lead-title">REGISTER</h2>
                <form class="register-form register-form--simple" id="register-form" novalidate>
                  <label class="field">
                    <img src="/images/icons/mail.svg" alt="email" class="field__icon" />
                    <input type="email" name="email" placeholder="E-mail" required />
                    <span class="field__hidden-placeholder" aria-hidden="true">E-mail</span>
                    <button class="field__clear" type="button" aria-label="Clear field" hidden>
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3C7 3 3 7 3 12C3 17 7 21 12 21C17 21 21 17 21 12C21 7 17 3 12 3ZM16.2 14.8C16.6 15.2 16.6 15.8 16.2 16.2C15.8 16.6 15.2 16.6 14.8 16.2C14.1 15.5 12 13.4 12 13.4C12 13.4 9.9 15.5 9.2 16.2C8.8 16.6 8.2 16.6 7.8 16.2C7.4 15.8 7.4 15.2 7.8 14.8C8.5 14.1 10.6 12 10.6 12C10.6 12 8.5 9.9 7.8 9.2C7.4 8.8 7.4 8.2 7.8 7.8C8.2 7.4 8.8 7.4 9.2 7.8C9.9 8.5 12 10.6 12 10.6C12 10.6 14.1 8.5 14.8 7.8C15.2 7.4 15.8 7.4 16.2 7.8C16.6 8.2 16.6 8.8 16.2 9.2L13.4 12C13.4 12 15.5 14.1 16.2 14.8Z" />
                      </svg>
                    </button>
                    <span class="field__error">
                      <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                      Invalid e-mail
                    </span>
                  </label>

                  <label class="field field--password">
                    <img src="/images/icons/psw.svg" alt="password" class="field__icon" />
                    <input type="password" name="password" placeholder="Password" required minlength="8" />
                    <span class="field__hidden-placeholder" aria-hidden="true">Password</span>
                    <button class="field__clear" type="button" aria-label="Clear field" hidden>
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3C7 3 3 7 3 12C3 17 7 21 12 21C17 21 21 17 21 12C21 7 17 3 12 3ZM16.2 14.8C16.6 15.2 16.6 15.8 16.2 16.2C15.8 16.6 15.2 16.6 14.8 16.2C14.1 15.5 12 13.4 12 13.4C12 13.4 9.9 15.5 9.2 16.2C8.8 16.6 8.2 16.6 7.8 16.2C7.4 15.8 7.4 15.2 7.8 14.8C8.5 14.1 10.6 12 10.6 12C10.6 12 8.5 9.9 7.8 9.2C7.4 8.8 7.4 8.2 7.8 7.8C8.2 7.4 8.8 7.4 9.2 7.8C9.9 8.5 12 10.6 12 10.6C12 10.6 14.1 8.5 14.8 7.8C15.2 7.4 15.8 7.4 16.2 7.8C16.6 8.2 16.6 8.8 16.2 9.2L13.4 12C13.4 12 15.5 14.1 16.2 14.8Z" />
                      </svg>
                    </button>
                    <button class="field__toggle" type="button" aria-label="Show password">
                      <svg class="field__eye" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 11.5C15 13.2 13.7 14.5 12 14.5C10.3 14.5 9 13.2 9 11.5C9 9.8 10.3 8.5 12 8.5C13.7 8.5 15 9.8 15 11.5ZM23 11.5C23 11.9 22.9 12.4 22.6 12.7C21 14.8 17.5 19 12 19C6.5 19 3 14.8 1.4 12.7C1.1 12.4 1 11.9 1 11.5C1 11.1 1.1 10.6 1.4 10.3C3 8.2 6.5 4 12 4C17.5 4 21 8.2 22.6 10.3C22.9 10.6 23 11.1 23 11.5ZM17 11.5C17 8.7 14.8 6.5 12 6.5C9.2 6.5 7 8.7 7 11.5C7 14.3 9.2 16.5 12 16.5C14.8 16.5 17 14.3 17 11.5Z" />
                      </svg>
                    </button>
                    <span class="field__error">
                      <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                      Password must be at least 8 characters
                    </span>
                  </label>
                  <label class="field field--password">
                    <img src="/images/icons/psw.svg" alt="password" class="field__icon" />
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required minlength="8" />
                    <span class="field__hidden-placeholder" aria-hidden="true">Confirm Password</span>
                    <button class="field__clear" type="button" aria-label="Clear field" hidden>
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3C7 3 3 7 3 12C3 17 7 21 12 21C17 21 21 17 21 12C21 7 17 3 12 3ZM16.2 14.8C16.6 15.2 16.6 15.8 16.2 16.2C15.8 16.6 15.2 16.6 14.8 16.2C14.1 15.5 12 13.4 12 13.4C12 13.4 9.9 15.5 9.2 16.2C8.8 16.6 8.2 16.6 7.8 16.2C7.4 15.8 7.4 15.2 7.8 14.8C8.5 14.1 10.6 12 10.6 12C10.6 12 8.5 9.9 7.8 9.2C7.4 8.8 7.4 8.2 7.8 7.8C8.2 7.4 8.8 7.4 9.2 7.8C9.9 8.5 12 10.6 12 10.6C12 10.6 14.1 8.5 14.8 7.8C15.2 7.4 15.8 7.4 16.2 7.8C16.6 8.2 16.6 8.8 16.2 9.2L13.4 12C13.4 12 15.5 14.1 16.2 14.8Z" />
                      </svg>
                    </button>
                    <button class="field__toggle" type="button" aria-label="Show password">
                      <svg class="field__eye" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 11.5C15 13.2 13.7 14.5 12 14.5C10.3 14.5 9 13.2 9 11.5C9 9.8 10.3 8.5 12 8.5C13.7 8.5 15 9.8 15 11.5ZM23 11.5C23 11.9 22.9 12.4 22.6 12.7C21 14.8 17.5 19 12 19C6.5 19 3 14.8 1.4 12.7C1.1 12.4 1 11.9 1 11.5C1 11.1 1.1 10.6 1.4 10.3C3 8.2 6.5 4 12 4C17.5 4 21 8.2 22.6 10.3C22.9 10.6 23 11.1 23 11.5ZM17 11.5C17 8.7 14.8 6.5 12 6.5C9.2 6.5 7 8.7 7 11.5C7 14.3 9.2 16.5 12 16.5C14.8 16.5 17 14.3 17 11.5Z" />
                      </svg>
                    </button>
                    <span class="field__error">
                      <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                      Passwords must match
                    </span>
                  </label>

                  <p class="register-form__error" id="register-form-error" role="alert" hidden></p>

                  <button class="register-form__submit" type="submit">
                    <span class="register-form__submit-text">Sign Up</span>
                    <svg width="426" height="72" viewBox="0 0 426 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <g clip-path="url(#clip0_52_1797)">
                        <path d="M-386 -431L-282.874 -355.294L-275.874 -367.419L-172.75 -291.714L-165.75 -303.838L-62.6238 -228.133L-55.6238 -240.257L47.5022 -164.552L54.5022 -176.676L157.627 -100.971L164.627 -113.096L267.752 -37.39L274.752 -49.5144L377.878 26.1912L384.878 14.0669L488.003 89.7716L495.003 77.6472L598.129 153.353L605.129 141.228L708.255 216.934" stroke="stroke" stroke-width="2" />
                        <path d="M-111 688.255L-35.2944 585.129L-47.4188 578.129L28.2859 475.005L16.1616 468.005L91.8672 364.879L79.7428 357.879L155.448 254.753L143.324 247.753L219.029 144.628L206.904 137.628L282.61 34.5024L270.486 27.5024L346.191 -75.6236L334.067 -82.6236L409.772 -185.748L397.647 -192.748L473.353 -295.874L461.228 -302.874L536.934 -406" stroke="stroke" stroke-width="2" />
                        <path d="M-494.332 -518.58L-406.61 -425.461L-397.532 -436.118L-309.811 -343L-300.733 -353.657L-213.011 -260.538L-203.932 -271.195L-116.211 -178.076L-107.132 -188.733L-19.4119 -95.6148L-10.3332 -106.272L77.3884 -13.1527L86.4671 -23.81L174.189 69.3094L183.267 58.6521L270.988 151.77L280.066 141.113L367.788 234.232L376.867 223.575L464.588 316.694" stroke="stroke" stroke-width="2" />
                        <path d="M-512 570.171L-412.183 490.153L-422.083 480.253L-322.267 400.237L-332.166 390.337L-232.349 310.319L-242.249 300.42L-142.432 220.402L-152.331 210.502L-52.5158 130.486L-62.4153 120.586L37.4017 40.5682L27.5022 30.6687L127.319 -49.3492L117.42 -59.2487L217.235 -139.265L207.336 -149.165L307.153 -229.183L297.253 -239.082L397.07 -319.1" stroke="stroke" stroke-width="2" />
                      </g>
                      <defs>
                        <clipPath id="clip0_52_1797">
                          <rect width="426" height="72" rx="12" fill="white" />
                        </clipPath>
                      </defs>
                    </svg>
                  </button>
                  <p class="register-form__signin">
                    Already have an account?
                    <a href="https://cuatrobet.com/login">Log In</a>
                  </p>
                </form>
              </div>
              <div class="form-panel__background-wrapper" aria-hidden="true">
                <img src="/images/patrick/background-footer.webp" alt="" class="form-panel__background" />
              </div>
            </section>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__container container">
          <p class="footer__label">2026</p>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/imask"></script>
  </body>
</html>

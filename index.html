<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./assets/img/favicon.ico">
		<title>Home Page</title>
		<script type="module" crossorigin="" src="./js/index.min.js?v=1773668259593"></script>
		<link rel="modulepreload" crossorigin="" href="./js/common.min.js?v=1773668259593">
		<link rel="stylesheet" crossorigin="" href="./css/index.min.css?v=1773668259593">
	</head>
	<body>
		<div class="wrapper">
			<header data-fls-header="" data-fls-header-scroll="" class="header">
				<div class="header__container">
					<!-- <include src="@components/layout/menu/menu.html" locals='{"active":"Home"}'></include> -->
					<div class="header__logo">
						<img src="./assets/img/svgicons/logo-icon.svg" alt="Logo" class="header__logo-icon">
						<img src="./assets/img/svgicons/logo-title.svg" alt="Logo" class="header__logo-title">
					</div>
					<div class="header__buttons">
						<a href="#" data-fls-button="" class="header__button button button--primary">Log In</a>
						<a href="#" data-fls-button="" class="header__button button button--secondary">Sign Up</a>
					</div>
				</div>
			</header>
			<main class="page">
				<!-- @format -->
				<main class="page">
					<section class="page__hero hero">
						<div class="hero__container container">
							<picture class="hero__picture">
								<picture>
									<source media="(max-width: 600px)" srcset="./assets/img/hero-image-600.webp" type="image/webp">
									<img class="hero__image" alt="Hero Image" src="./assets/img/hero-image.webp">
								</picture>
								<span class="hero__label hero__label--1">Cuatro</span>
								<span class="hero__label hero__label--2">Partners</span>
							</picture>
						</div>
						<div class="hero__banner banner">
							<div class="banner__container container">
								<h2 class="banner__title">Where Traffic Meets Winning</h2>
							</div>
						</div>
					</section>
					<section class="page__form form">
						<div class="form__container container">
							<form data-fls-form="ajax" data-fls-form-popup="popup" method="post" action="#" class="form__body">
								<div class="form__lines">
									<div class="form__line">
										<img class="form__icon" src="./assets/img/svgicons/email.svg" alt="Email icon">
										<input data-fls-form-errtext="E-mail error" data-fls-input="" required type="email" placeholder="email" name="email" class="form__input">
									</div>
									<div class="form__line">
										<label for="password" class="form__visually-hidden">Password</label>
										<img class="form__icon" src="./assets/img/svgicons/password.svg" alt="Password icon">
										<input data-fls-form-errtext="Password required" data-fls-input="" required autocomplete="new-password" type="password" placeholder="Password" name="password" class="form__input">
										<button type="button" class="form__input-button" aria-label="Show password" data-fls-input-viewpass=""></button>
									</div>
									<div class="form__line">
										<label for="confirm-password" class="form__visually-hidden">Confirm password</label>
										<img class="form__icon" src="./assets/img/svgicons/password.svg" alt="Password icon">
										<input data-fls-form-errtext="confirm password required" data-fls-input="" required autocomplete="new-password" type="confirm-password" placeholder="confirm password" name="confirm_password" class="form__input">
										<button type="button" class="form__input-button" aria-label="Show password" data-fls-input-viewpass=""></button>
									</div>
								</div>
								<button type="submit" class="form__button button--secondary">Sign Up</button>
								<a href="#" class="form__login-link">
									<p>Already have an account?</p>
									<span>Log In</span>
								</a>
							</form>
						</div>
					</section>
				</main>
			</main>
			<footer data-fls-footer="" class="footer">
				<div class="footer__container">
					<p class="footer__label">2026</p>
				</div>
			</footer>
		</div>
	</body>
</html>

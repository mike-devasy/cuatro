<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./assets/img/favicon.ico">
		<title>Home Page</title>
		<script type="module" crossorigin="" src="./js/index.min.js?v=1773577981894"></script>
		<link rel="stylesheet" crossorigin="" href="./css/index.min.css?v=1773577981894">
	</head>
	<body>
		<div class="wrapper">
			<header data-fls-header="" data-fls-header-scroll="" class="header">
				<div class="header__container">
					<!-- <include src="@components/layout/menu/menu.html" locals='{"active":"Home"}'></include> -->
					<div class="header__logo">
						<img src="./assets/img/svgicons/logo-icon.svg" alt="Logo" class="header__logo-icon">
						<img src="./assets/img/svgicons/logo-title.svg" alt="Logo" class="header__logo-title">
					</div>
					<div class="header__buttons">
						<a href="#" data-fls-button="" class="header__button button button--primary">Log in</a>
						<a href="#" data-fls-button="" class="header__button button button--secondary">Sign up</a>
					</div>
				</div>
			</header>
			<main class="page">
				<main class="page">
					<section class="page__hero hero">
						<div class="hero__container container">
							<picture class="hero__picture">
								<picture>
									<source media="(max-width: 600px)" srcset="./assets/img/hero-image-600.webp" type="image/webp">
									<img class="hero__image" alt="Hero Image" src="./assets/img/hero-image.webp">
								</picture>
								<span class="hero__label hero__label--1">Cuatro</span>
								<span class="hero__label hero__label--2">Partners</span>
							</picture>
						</div>
						<div class="hero__banner banner">
							<div class="banner__container container">
								<h2 class="banner__title">Where Traffic Meets Winning</h2>
							</div>
						</div>
					</section>
				</main>
			</main>
			<footer data-fls-footer="" class="footer">
				<div class="footer__container"></div>
			</footer>
		</div>
